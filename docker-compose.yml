services:
  web:
    build: .
    container_name: viveiroweb
    ports:
      - "8000:8000"
    volumes:
      # Sem montar o código: usa o que foi copiado no build (manage.py em /app)
      # Persiste o banco de dados SQLite
      - ./viveiroweb/db.sqlite3:/app/db.sqlite3
      # Persiste as imagens enviadas
      - ./viveiroweb/imagens:/app/imagens
    environment:
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=viveiroweb.settings
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn viveiroweb.wsgi:application --bind 0.0.0.0:8000 --workers 3 --chdir /app"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Expor por caminho (sem subdomínio): https://SEU_DOMINIO/viveiroweb
      - "traefik.http.routers.viveiroweb.rule=Host(`integramaker.ifpb.edu.br`) && (PathPrefix(`/viveiroweb`) || Path(`/viveiroweb`))"
      - "traefik.http.routers.viveiroweb.entrypoints=websecure"
      - "traefik.http.routers.viveiroweb.tls=true"
      - "traefik.http.routers.viveiroweb.tls.certresolver=le"
      - "traefik.http.middlewares.viveiroweb-stripprefix.stripprefix.prefixes=/viveiroweb"
      - "traefik.http.routers.viveiroweb.middlewares=viveiroweb-stripprefix@docker"
      - "traefik.http.services.viveiroweb.loadbalancer.server.port=8000"
      - "traefik.docker.network=proxy"
    networks:
      - proxy

networks:
  proxy:
    external: true